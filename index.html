<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

    /* ── Reset & base ─────────────────────────────────────────────────── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /*
     * ── Design tokens (arctic overlay) ────────────────────────────────
     *
     *  Colors
     *  bg:                 #050c14
     *  accent:             #38bdf8  (ice blue, replaces #0063e5)
     *  accent-dim:         rgba(56,189,248,0.12)
     *  accent-glow:        0 0 14px rgba(56,189,248,0.18)
     *  surface-1 (cards):  rgba(255,255,255,.03)
     *  surface-2 (hover):  rgba(56,189,248,.04)
     *  border:             rgba(56,189,248,0.09) / .3 on hover
     *  text muted:         rgba(255,255,255,.45)
     *  header gradient:    135deg, #0369a1 0%, #0c1a2e 45%, #050c14 100%
     *  font-mono:          "SF Mono", "Fira Code", monospace
     */

    :root {
      --bg: #050c14;
      --surface-1: rgba(255,255,255,.03);
      --surface-2: rgba(56,189,248,.04);
      --border: rgba(255,255,255,.1);
      --card-border: rgba(56,189,248,.09);
      --text-primary: #f9f9f9;
      --text-secondary: #cacaca;
      --text-muted: rgba(255,255,255,.45);
      --accent: #38bdf8;
      --accent-dim: rgba(56,189,248,.12);
      --font: 'Avenir Next', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      --font-mono: "SF Mono", "Fira Code", monospace;
      --text-xs: 0.75rem; --text-sm: 0.875rem; --text-base: 1rem;
      --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
      --space-6: 24px; --space-8: 32px;
      --radius-sm: 6px; --radius: 10px; --radius-lg: 15px;
      --ease-snap: cubic-bezier(0.34, 1.56, 0.64, 1);
      --dur-fast: 120ms; --dur: 200ms;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      min-height: 100vh;
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ───────────────────────────────────────────────────────── */
    .header-bar {
      background: linear-gradient(135deg, #0369a1 0%, #0c1a2e 45%, #050c14 100%);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.07);
      padding: 0 24px;
      height: 68px;
      position: sticky;
      top: 0;
      z-index: 200;
      display: flex;
      align-items: center;
    }

    .header-logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; text-decoration: none; color: inherit; }

    .header-logo-img {
      height: 36px; width: auto; flex-shrink: 0;
      filter: brightness(0) invert(1);
      transition: transform 0.3s var(--ease-snap);
      display: block;
    }
    .header-logo-img:hover { transform: scale(1.14) rotate(-9deg); }

    .header-logo h1 { font-size: 1.2em; font-weight: 600; color: #f9f9f9; letter-spacing: .5px; }
    .header-subtitle { font-size: .82em; color: rgba(255,255,255,.72); font-weight: 500; margin-top: 3px; font-family: var(--font-mono); }

    nav { display: flex; align-items: center; gap: 6px; margin-left: auto; }
    .nav-link {
      font-size: .8rem; font-weight: 500; color: var(--text-secondary);
      text-decoration: none; padding: 5px 12px; border-radius: 20px;
      border: 1px solid transparent;
      transition: color .2s, border-color .2s, background .2s;
    }
    .nav-link:hover { color: var(--text-primary); border-color: rgba(56,189,248,.25); background: rgba(56,189,248,.07); }

    .header-home {
      display: flex; align-items: center;
      margin-left: 4px;
      padding: 5px;
      color: rgba(255,255,255,0.9); text-decoration: none;
      border-radius: var(--radius-sm);
      transition: color .2s, background .2s; flex-shrink: 0;
    }
    .header-home:hover { color: #fff; background: rgba(255,255,255,0.12); }
    .header-home svg { width: 34px; height: 34px; display: block; }

    /* ── Main container ──────────────────────────────────────────────── */
    .container {
      max-width: 1280px;
      width: 100%;
      margin: 0 auto;
      padding: 28px 24px;
      flex: 1;
    }

    /* ── Search bar ──────────────────────────────────────────────────── */
    .search-wrap {
      position: relative;
      margin-bottom: 18px;
    }
    .search-wrap svg {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      width: 16px; height: 16px;
      color: var(--text-muted);
      pointer-events: none;
    }
    #searchInput {
      width: 100%;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px 12px 42px;
      font: inherit;
      font-size: .95rem;
      color: var(--text-primary);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    #searchInput::placeholder { color: var(--text-muted); }
    #searchInput:focus {
      border-color: rgba(56,189,248,.4);
      box-shadow: 0 0 0 3px rgba(56,189,248,.07);
    }

    /* ── Category chips ──────────────────────────────────────────────── */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 20px;
    }
    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.12);
      background: var(--surface-1);
      color: var(--text-secondary);
      font-size: .8rem;
      font-family: var(--font);
      cursor: pointer;
      user-select: none;
      transition: border-color .15s, background .15s, color .15s;
    }
    .chip:hover {
      border-color: rgba(56,189,248,.35);
      color: var(--text-primary);
    }
    .chip.active {
      background: rgba(56,189,248,.14);
      border-color: var(--accent);
      color: var(--accent);
    }
    .chip-count {
      font-size: .72rem;
      opacity: .6;
      font-family: var(--font-mono);
    }

    /* ── Result info ─────────────────────────────────────────────────── */
    .result-info {
      font-size: .75rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
      margin-bottom: 14px;
      letter-spacing: .3px;
    }

    /* ── Emoji grid ──────────────────────────────────────────────────── */
    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(104px, 1fr));
      gap: 10px;
    }

    /* ── Emoji card ──────────────────────────────────────────────────── */
    .emoji-card {
      position: relative;
      background: var(--surface-1);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 14px 8px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      overflow: hidden;
      transition: border-color var(--dur), box-shadow var(--dur), background var(--dur);
    }
    .emoji-card:hover {
      border-color: rgba(56,189,248,.32);
      box-shadow: 0 0 14px rgba(56,189,248,.18);
      background: var(--surface-2);
    }

    .emoji-img {
      width: 64px; height: 64px;
      object-fit: contain;
      display: block;
      flex-shrink: 0;
    }

    .emoji-meta {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .emoji-name {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      text-align: center;
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }
    .emoji-badges {
      display: flex; align-items: center; gap: 4px;
    }
    .badge-ext {
      font-family: var(--font-mono);
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      background: rgba(56,189,248,.09);
      border: 1px solid rgba(56,189,248,.2);
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: .5px;
      line-height: 1.6;
    }
    .badge-id {
      font-family: var(--font-mono);
      font-size: 9px;
      color: rgba(255,255,255,.22);
      letter-spacing: .3px;
    }

    /* ── Hover overlay ───────────────────────────────────────────────── */
    .emoji-overlay {
      position: absolute;
      inset: 0;
      background: rgba(5,12,20,.80);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--dur);
      border-radius: var(--radius);
    }
    .emoji-card:hover .emoji-overlay {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay-btn {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px;
      border-radius: 8px;
      border: 1px solid rgba(56,189,248,.3);
      background: rgba(56,189,248,.12);
      color: var(--accent);
      cursor: pointer;
      transition: background .15s, transform .15s var(--ease-snap);
    }
    .overlay-btn:hover {
      background: rgba(56,189,248,.24);
      transform: scale(1.1);
    }
    .overlay-btn svg { width: 16px; height: 16px; display: block; }

    /* ── Empty state ─────────────────────────────────────────────────── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 64px 20px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: .85rem;
    }

    /* ── Toast ───────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: rgba(56,189,248,.13);
      border: 1px solid rgba(56,189,248,.35);
      backdrop-filter: blur(12px);
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: .82rem;
      padding: 9px 20px;
      border-radius: 20px;
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s, transform .2s var(--ease-snap);
      z-index: 999;
      white-space: nowrap;
    }
    #toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Footer ───────────────────────────────────────────────────────── */
    .info-footer {
      text-align: center;
      padding: 20px 24px 28px;
      color: rgba(255,255,255,.22);
      font-size: .78em;
      line-height: 1.8;
      border-top: 1px solid rgba(255,255,255,.05);
      margin-top: 32px;
      font-family: var(--font-mono);
    }
    .info-footer a { color: rgba(56,189,248,.55); text-decoration: none; }
    .info-footer a:hover { color: var(--accent); }

    /* ── Mobile ──────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .container { padding: 20px 16px; }
      .emoji-grid { grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)); gap: 8px; }
      .header-logo h1 { font-size: 1rem; }
      .header-subtitle { display: none; }
    }

  </style>
</head>

    /* ── Category setup ──────────────────────────────────────────────── */
    const CATEGORIES = ['argentina','chile','development','essentials','logos','parrots','think'];
    const COUNTS = {};
    EMOJIS.forEach(e => { COUNTS[e.category] = (COUNTS[e.category] || 0) + 1; });

    let activeCategory = 'all';

    /* ── Build chips ─────────────────────────────────────────────────── */
    const chipsEl = document.getElementById('chips');
    chipsEl.appendChild(makeChip('all', 'All', EMOJIS.length));
    CATEGORIES.forEach(cat => chipsEl.appendChild(makeChip(cat, cat, COUNTS[cat])));

    function makeChip(value, label, count) {
      const c = document.createElement('button');
      c.className = 'chip' + (value === 'all' ? ' active' : '');
      c.dataset.value = value;
      c.innerHTML = `${label}<span class="chip-count">${count}</span>`;
      c.addEventListener('click', () => {
        document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
        c.classList.add('active');
        activeCategory = value;
        filterGrid();
      });
      return c;
    }

    /* ── Filter & render ─────────────────────────────────────────────── */
    const grid = document.getElementById('emojiGrid');
    const searchInput = document.getElementById('searchInput');
    const resultInfo = document.getElementById('resultInfo');

    function filterGrid() {
      const q = searchInput.value.toLowerCase().trim();
      const filtered = EMOJIS.filter(e => {
        const catMatch = activeCategory === 'all' || e.category === activeCategory;
        const nameMatch = !q || e.name.toLowerCase().includes(q);
        return catMatch && nameMatch;
      });
      renderGrid(filtered);
    }

    function renderGrid(emojis) {
      grid.innerHTML = '';
      if (emojis.length === 0) {
        const el = document.createElement('div');
        el.className = 'empty-state';
        el.textContent = '// no specimens match';
        grid.appendChild(el);
      } else {
        const frag = document.createDocumentFragment();
        emojis.forEach(e => frag.appendChild(makeCard(e)));
        grid.appendChild(frag);
      }
      resultInfo.textContent = `${emojis.length} specimen${emojis.length !== 1 ? 's' : ''}`;
    }

    /* ── Card builder ────────────────────────────────────────────────── */
    const COPY_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>`;
    const DL_SVG   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;

    function makeCard(e) {
      const card = document.createElement('div');
      card.className = 'emoji-card';

      const img = document.createElement('img');
      img.className = 'emoji-img';
      img.src = e.path;
      img.alt = e.name;
      img.loading = 'lazy';

      const meta = document.createElement('div');
      meta.className = 'emoji-meta';
      meta.innerHTML = `
        <div class="emoji-name" title="${e.name}">${e.name}</div>
        <div class="emoji-badges">
          <span class="badge-ext">${e.ext}</span>
          <span class="badge-id">#${String(e.id).padStart(4,'0')}</span>
        </div>`;

      const overlay = document.createElement('div');
      overlay.className = 'emoji-overlay';

      const copyBtn = document.createElement('button');
      copyBtn.className = 'overlay-btn';
      copyBtn.title = 'Copy';
      copyBtn.innerHTML = COPY_SVG;
      copyBtn.addEventListener('click', () => copyEmoji(e.path, e.ext));

      const dlBtn = document.createElement('button');
      dlBtn.className = 'overlay-btn';
      dlBtn.title = 'Download';
      dlBtn.innerHTML = DL_SVG;
      dlBtn.addEventListener('click', () => downloadEmoji(e.path, `${e.name}.${e.ext}`));

      overlay.appendChild(copyBtn);
      overlay.appendChild(dlBtn);
      card.appendChild(img);
      card.appendChild(meta);
      card.appendChild(overlay);
      return card;
    }

    /* ── Copy to clipboard ───────────────────────────────────────────── */
    // ClipboardItem only accepts image/png — so we draw every source format
    // (png, jpg) onto a canvas and export as PNG before writing to clipboard.
    async function copyEmoji(path, ext) {
      if (ext === 'gif') {
        showToast("GIFs can't be clipboard-copied — use Download");
        return;
      }
      try {
        const img = await new Promise((resolve, reject) => {
          const i = new Image();
          i.onload = () => resolve(i);
          i.onerror = reject;
          i.src = path;
        });
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        canvas.getContext('2d').drawImage(img, 0, 0);
        const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        showToast('Copied to clipboard');
      } catch (err) {
        showToast('Copy failed — try Download instead');
      }
    }

    /* ── Download ────────────────────────────────────────────────────── */
    function downloadEmoji(path, filename) {
      const a = document.createElement('a');
      a.href = path;
      a.download = filename;
      a.click();
    }

    /* ── Toast ───────────────────────────────────────────────────────── */
    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('visible');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('visible'), 2000);
    }

    /* ── Search listener & init ──────────────────────────────────────── */
    searchInput.addEventListener('input', filterGrid);
    filterGrid();
  </script>
