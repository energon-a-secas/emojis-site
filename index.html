<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emoji Archive | Neorgon</title>
  <meta name="description" content="Browse and download 202 custom Slack emojis, from party parrots to dev logos">
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <a class="skip-link" href="#main">Skip to content</a>

  <header class="header-bar">
    <a class="header-logo" href="https://emojis.neorgon.com/">
      <img src="energon-classic-logo.png" class="header-logo-img" alt="Neorgon">
      <div>
        <h1>Emoji Archive</h1>
        <div class="header-subtitle">202 preserved specimens</div>
      </div>
    </a>
    <nav>
      <button class="nav-link" id="uploadToggle" style="color:var(--accent);border-color:rgba(56,189,248,.2)">Upload</button>
      <a class="header-home" href="https://neorgon.com/" title="neorgon.com" target="_blank" rel="noopener noreferrer" aria-label="Neorgon home">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
      </a>
    </nav>
  </header>

  <main class="container" id="main">

    <!-- Upload panel -->
    <div class="upload-panel" id="uploadPanel">
      <h3>Upload Emoji</h3>
      <!-- Password gate -->
      <div id="pwGate">
        <div class="pw-row">
          <input type="password" id="pwInput" placeholder="Enter upload password" autocomplete="off">
          <button id="pwSubmit">Unlock</button>
        </div>
      </div>
      <!-- Upload zone (hidden until authenticated) -->
      <div id="uploadZone" style="display:none">
        <div class="drop-zone" id="dropZone">Drop an image here, or click to browse</div>
        <input type="file" id="fileInput" accept="image/png,image/jpeg,image/gif,image/webp" style="display:none">
        <div id="uploadPreview" style="display:none">
          <div class="upload-preview">
            <img id="previewImg" src="" alt="preview">
            <div class="upload-fields">
              <input type="text" id="emojiNameInput" placeholder="Emoji name">
              <select id="emojiCatSelect">
                <option value="uncategorized">uncategorized</option>
                <option value="argentina">argentina</option>
                <option value="chile">chile</option>
                <option value="development">development</option>
                <option value="essentials">essentials</option>
                <option value="logos">logos</option>
                <option value="parrots">parrots</option>
                <option value="simpsons">simpsons</option>
                <option value="think">think</option>
              </select>
            </div>
          </div>
          <button class="upload-submit-btn" id="uploadSubmit">Upload Emoji</button>
        </div>
      </div>
    </div>

    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="searchInput" type="text" placeholder="Search 202 specimens…" autocomplete="off" spellcheck="false">
    </div>

    <div class="chips" id="chips"></div>
    <div class="result-info" id="resultInfo"></div>
    <div class="emoji-grid" id="emojiGrid"></div>

  </main>

  <footer class="info-footer">
    Emoji Archive &middot;
    <a href="https://neorgon.com/">neorgon.com</a>
    &nbsp;&middot;&nbsp;
    <a href="https://github.com/energon-a-secas/emojis-site" target="_blank" rel="noopener noreferrer">GitHub</a>
  </footer>

  <div id="toast"></div>

  <script type="module" src="js/app.js"></script>

</body>
</html>
